# --- What Sprint 3 wired ---
#
# vault:
#   Secrets store for credential injection. API tokens fetched at tool call time.
#   Dev mode only — not for production.
#
# redis:
#   Layer 1 session state. Message history cache with 1hr TTL.
#   Falls back to in-memory when unavailable (CI).
#
# --- What Sprint 3 provisioned (not yet wired) ---
#
# chroma: Layer 2 semantic memory — wired in Sprint 6 for RAG.
# minio:  Layer 4 artifact storage — wired in Sprint 8 for trace archiving.

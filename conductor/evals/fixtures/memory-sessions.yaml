# Memory fixture sessions — provider benchmark
#
# Seeds prior session context into each memory provider before the eval run.
# The same fixture is used across all providers — identical starting point.
#
# Three users:
#   eval-fixture-alice  Snowflake + dbt troubleshooting context (near-exact and vague queries)
#   eval-fixture-bob    BigQuery 401 error + connector health context (paraphrase queries)
#   eval-fixture-charlie  No memories — isolation probe (any retrieval = hard FAIL)
#
# query_distance labels (for report interpretation):
#   near_exact   — eval case input uses same terminology as stored content
#   paraphrase   — eval case input rephrases the stored fact
#   vague        — eval case input loosely references the topic ("same problem")
#
# Maps to eval cases that memory can plausibly help:
#   alice → troubleshooting-easy-003, troubleshooting-medium-001, setup-hard-001
#   bob   → troubleshooting-medium-002, onboarding-medium-002

users:
  - user_id: eval-fixture-alice
    description: "Data engineer troubleshooting Snowflake and dbt connectors across sessions"
    memories:
      # Near-exact: eval case asks about re-running Redshift sync
      - content: "Redshift connector last sync failed with error code 8001. Connection dropped after 30 seconds. User already verified VPC security group rules allow inbound on port 5439."
        metadata: {type: episode, connector: redshift, query_distance: near_exact}
        ttl_seconds: null

      # Near-exact: eval case asks about dbt lineage not appearing
      - content: "dbt Cloud project ID 4821. Using job-based manifest. Lineage not appearing after successful dbt run. manifest.json path confirmed correct at target/manifest.json. Lineage backend: Atlas."
        metadata: {type: episode, connector: dbt, query_distance: near_exact}
        ttl_seconds: null

      # Paraphrase: eval case says "still having the Snowflake problem" — different wording
      - content: "Snowflake JDBC connection timeout on SELECT queries. Already tried increasing query_timeout to 30000ms. Did not resolve. Account region: us-east-1, Enterprise tier."
        metadata: {type: episode, connector: snowflake, query_distance: paraphrase}
        ttl_seconds: null

      # Vague: eval case will reference "the connector setup" without naming the source
      - content: "User is setting up Redshift connector for the first time. Authentication method: IAM role. Has not yet configured the private networking option. VPC peering is the preferred approach per their infra team."
        metadata: {type: entity, connector: redshift, query_distance: vague}
        ttl_seconds: null

      # Preference fact — helps setup and onboarding modes respond appropriately
      - content: "User is a data engineer at a mid-size fintech. Prefers step-by-step guidance with explicit commands. Gets frustrated when asked to re-explain context already given in prior sessions."
        metadata: {type: entity, category: preference, query_distance: paraphrase}
        ttl_seconds: null

      # TTL test — should expire before eval runs (seeded with ttl=1s, queried after sleep)
      - content: "TTL test: this memory should not be retrievable after expiry."
        metadata: {type: entity, category: ttl_test}
        ttl_seconds: 1

  - user_id: eval-fixture-bob
    description: "Analytics engineer troubleshooting BigQuery 401 error after key rotation"
    memories:
      # Near-exact: eval case uses "401" and "service account key"
      - content: "BigQuery connector returning 401 Unauthorized errors after service account key rotation two days ago. GCP project: analytics-prod. Service account: sa-catalog-reader@analytics-prod.iam.gserviceaccount.com. Key was rotated via GCP console."
        metadata: {type: episode, connector: bigquery, query_distance: near_exact}
        ttl_seconds: null

      # Paraphrase: eval case says "I finished setting up my BigQuery connector" — different framing
      - content: "BigQuery connector initial setup completed 2 days ago. Last sync status: failed. Asset count: 0 tables visible in catalog. Expected: 47 tables across 3 datasets."
        metadata: {type: entity, connector: bigquery, query_distance: paraphrase}
        ttl_seconds: null

      # Vague: eval case might say "my data warehouse connector"
      - content: "User is an analytics engineer. Primary data warehouse: BigQuery. GCP project: analytics-prod. Uses service account authentication. Team size: 3 engineers."
        metadata: {type: entity, category: profile, query_distance: vague}
        ttl_seconds: null

  - user_id: eval-fixture-charlie
    description: "Isolation probe — zero memories seeded. Any retrieval is a hard FAIL."
    memories: []

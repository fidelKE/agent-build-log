# Agent Bill of Materials (ABOM) for Conductor Sprint 4
# Sprint 4 scope: supply chain security (§59)
#
# Registers the hashes of all pipeline components. bom_validator.py reads this
# file and exits non-zero if any component has drifted since the ABOM was last
# generated. This is the prompt-hash-drift detection layer: a rotated credential
# is useless if the system prompt has been silently modified.
#
# Deferred (Sprint 7a): SLSA provenance signing, CycloneDX SBOM, MCP server schema pinning.


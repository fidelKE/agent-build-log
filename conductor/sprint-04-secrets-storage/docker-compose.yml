# This file documents what Sprint 3 added to the infrastructure stack:
#   - Vault (secrets)
#   - Redis (L1 session state)
#   - Chroma (L2, provisioned — wired in Sprint 6)
#   - MinIO (L4, provisioned — wired in Sprint 8)

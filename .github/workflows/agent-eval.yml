name: Agent Quality Gate

# Workflow is triggered manually only — scripts are the primary interface (RULE-CI03).
# Developers run scripts/check_eval_gate.py and scripts/regression_check.py locally.
# This workflow calls the same scripts; it is a thin caller, not the source of logic.
#
# To trigger manually: Actions tab → Agent Quality Gate → Run workflow
on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Eval dataset filename (from evals/datasets/)"
        required: false
        default: "conductor-v2.yaml"  # public dataset, safe to run in CI
      sample_size:
        description: "Number of cases to sample (leave blank for full suite)"
        required: false
        default: "15"
      threshold:
        description: "Overall pass rate threshold (0.0–1.0)"
        required: false
        default: "0.85"

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: conductor/sprint-05a-cicd-eval-gate
        run: UV_PROJECT_ENVIRONMENT=../.venv uv sync --extra dev

      - name: Run deterministic unit tests
        working-directory: conductor/sprint-05a-cicd-eval-gate
        run: UV_PROJECT_ENVIRONMENT=../.venv uv run pytest tests/ -v --tb=short

  eval-quality-gate:
    name: Eval quality gate
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: conductor/sprint-05-memory-evals
        run: UV_PROJECT_ENVIRONMENT=../.venv uv sync --extra dev

      - name: Run eval sample
        working-directory: conductor/sprint-05a-cicd-eval-gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_GATEWAY_URL: ${{ secrets.LLM_GATEWAY_URL }}
        run: |
          UV_PROJECT_ENVIRONMENT=../.venv uv run python scripts/run_eval_sample.py \
            --dataset ../evals/datasets/${{ github.event.inputs.dataset }} \
            --sample ${{ github.event.inputs.sample_size }} \
            --output results/ci-sample.json \
            --memory-provider inmemory

      - name: Check quality gate
        working-directory: conductor/sprint-05a-cicd-eval-gate
        run: |
          UV_PROJECT_ENVIRONMENT=../.venv uv run python scripts/check_eval_gate.py \
            --report results/ci-sample.json \
            --threshold ${{ github.event.inputs.threshold }} \
            --categories troubleshooting:0.80 knowledge_qa:0.80

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: eval-report-${{ github.run_id }}
          path: conductor/sprint-05a-cicd-eval-gate/results/ci-sample.json

  regression-check:
    name: Regression check
    runs-on: ubuntu-latest
    needs: eval-quality-gate
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: conductor/sprint-05a-cicd-eval-gate
        run: UV_PROJECT_ENVIRONMENT=../.venv uv sync --extra dev

      - name: Download current eval report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: eval-report-${{ github.run_id }}
          path: conductor/sprint-05a-cicd-eval-gate/results/

      - name: Check for regression against baseline
        working-directory: conductor/sprint-05a-cicd-eval-gate
        run: |
          if [[ -f results/baseline.json ]]; then
            UV_PROJECT_ENVIRONMENT=../.venv uv run python scripts/regression_check.py \
              --current results/ci-sample.json \
              --baseline results/baseline.json \
              --max-regression 0.03
          else
            echo "No baseline found — saving current run as baseline."
            cp results/ci-sample.json results/baseline.json
          fi
